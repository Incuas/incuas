  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // Function to open the accordion and scroll to it
      function openAccordion(hash) {
        const targetElement = document.querySelector(hash);

        // Check if the target exists and is an accordion panel
        if (targetElement && targetElement.classList.contains('accordion-collapse')) {

          // Use Bootstrap 5 API to show the collapse
          const bsCollapse = new bootstrap.Collapse(targetElement, {
            toggle: false
          });
          bsCollapse.show();

          // Smooth scroll to the accordion header so the user sees it
          setTimeout(() => {
            targetElement.parentElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 300); // Slight delay allows the accordion to open first
        }
      }

      // 1. Check if the URL already has a hash when the page loads (e.g., coming from another page)
      if (window.location.hash) {
        openAccordion(window.location.hash);
      }

      // 2. Listen for clicks on links that point to the services (if clicked while on the same page)
      const serviceLinks = document.querySelectorAll('a[href*="#service"]');

      serviceLinks.forEach(link => {
        link.addEventListener('click', function (e) {
          // Extract the hash (e.g., "#service3") from the link's href
          const url = new URL(this.href, window.location.origin);
          const hash = url.hash;

          if (hash) {
            // If we are already on index.html, prevent default jump and handle smoothly
            if (window.location.pathname === url.pathname || window.location.pathname === '/') {
              e.preventDefault();
              history.pushState(null, null, hash); // Update the URL bar
              openAccordion(hash);
            }
          }
        });
      });

    });
  </script>
